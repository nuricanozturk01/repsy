<section id="repository-storage" class="mt-[-100px] pt-[100px]">
  <h3 class="w-full rounded-t-[12px] border border-[#404141] bg-[#101112] p-[24px] font-medium text-[#FDFDFD]">
    <a [routerLink]="[]" fragment="repository-storage"> Repository Storage </a>
  </h3>

  <div class="rounded-b-2xl border-r border-b border-l border-[#404141] bg-[#101112] p-6">
    <!-- Disk Usage Info -->
    <div class="mb-6 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-[14px] text-white">Disk Usage</span>
        <span class="text-[14px] font-medium text-[#00DC82]">{{ usage?.diskUsed?.text || '0 B' }}</span>
      </div>
    </div>
  </div>
</section>
