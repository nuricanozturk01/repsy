@if (loading) {
  <app-spinner />
} @else {
  @if (repositorySettings || mavenRepositorySettings) {
    <div class="space-y-[24px]" animate.enter="fade-in-down">
      <h2 class="text-[14px] text-[#9FA0A0]">Repository Settings</h2>

      <div>
        <app-visibility
          [parentForm]="repoType === 'maven' ? mavenSettingsForm : generalSettingsForm"
          [repoType]="repoType"
          (fetch)="getRepoSettings()"
        />
      </div>

      <div>
        @if (repoType !== 'cargo' && repoType !== 'golang') {
          <app-package-override
            [parentForm]="repoType === 'maven' ? mavenSettingsForm : generalSettingsForm"
            [repoType]="repoType"
            (fetch)="getRepoSettings()"
          />
        }
      </div>

      <div>
        @if (repoType === 'maven') {
          <app-maven-version-allowence [parentForm]="mavenSettingsForm" (fetch)="getRepoSettings()" />
        }
      </div>

      @if (repoType === 'maven') {
        <div><app-signature [repoType]="repoType" [activeRepository]="activeRepository" /></div>
      }
      <div><app-deploy-token [repoType]="repoType" [activeRepository]="activeRepository"></app-deploy-token></div>
      <div><app-repo-storage [repoType]="repoType" /></div>
      <div><app-repo-info [repoType]="repoType" [activeRepository]="activeRepository" /></div>
      <div><app-delete-repo [repoType]="repoType" [activeRepository]="activeRepository" /></div>
    </div>
  } @else {
    <div animate.enter="fade-in-up" class="p-8 text-center">
      <img
        class="mx-auto mb-[70px]"
        ngSrc="/assets/images/hippo-empty.svg"
        alt="hippo-empty"
        height="243"
        width="510"
      />
      <div>
        <p class="text-[28px] text-[#9FA0A0]">404</p>
        <p class="mt-2 text-[20px] text-[#9FA0A0]">Repository settings not found!</p>
      </div>
    </div>
  }
}
