<div class="min-h-[295px] w-full rounded-[12px] border border-[#404141] bg-[#101112]">
  <!-- Repository List -->
  <div class="flex flex-col gap-[12px] p-[20px]">
    <!-- Docker Row -->
    <a
      href="javascript:void(0)"
      (click)="routeDocker()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ dockerRepoCount }} / Registries are in use.</div>
      <div class="h-[23.48px] w-[27.09px]">
        <img ngSrc="/assets/icons/docker/docker-light.svg" alt="Docker" height="87" width="101" />
      </div>
    </a>

    <!-- Maven Row -->
    <a
      href="javascript:void(0)"
      (click)="routeMaven()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ mavenRepoCount }} / Repositories are in use.</div>
      <div class="h-[11.81px] w-[50.58px]">
        <img ngSrc="/assets/icons/maven/maven-light.svg" alt="Maven" height="58" width="213" />
      </div>
    </a>

    <!-- NPM Row -->
    <a
      href="javascript:void(0)"
      (click)="routeNpm()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ npmRegistryCount }} / Registries are in use.</div>
      <div class="h-[20.36px] w-[31.67px]">
        <img ngSrc="/assets/icons/npm/npm-light.svg" alt="NPM" height="84" width="141" />
      </div>
    </a>

    <!-- Python Row -->
    <a
      href="javascript:void(0)"
      (click)="routePypi()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ pypiRepoCount }} / Repositories are in use.</div>
      <div class="h-[22.73px] w-[22.49px]">
        <img ngSrc="/assets/icons/pypi/pypi2-light.svg" alt="Python" height="46" width="46" />
      </div>
    </a>

    <!-- Golang Row -->
    <a
      href="javascript:void(0)"
      (click)="routeGolang()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ golangRepoCount }} / Repositories are in use.</div>
      <div class="h-[23px] w-[38px]">
        <img ngSrc="/assets/icons/golang/golang-light.svg" alt="Go" height="23" width="60" />
      </div>
    </a>

    <!-- Cargo Row -->
    <a
      href="javascript:void(0)"
      (click)="routeCargo()"
      class="flex h-[43px] items-center justify-between rounded-[12px] border border-[#101112] bg-linear-to-b from-[rgba(17,16,16,0.6)] to-[#1D1C1C] px-[20px] hover:border-[#404141]"
    >
      <div class="text-[13px] text-[#FDFDFD]">{{ cargoRepoCount }} / Repositories are in use.</div>
      <div class="h-[22px] w-[22px] text-[#9FA0A0]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M12 2.4L8.4 4.5V8.7L12 10.8L15.6 8.7V4.5L12 2.4Z" />
            <path d="M6.2 9.6L2.6 11.7V15.9L6.2 18L9.8 15.9V11.7L6.2 9.6Z" />
            <path d="M17.8 9.6L14.2 11.7V15.9L17.8 18L21.4 15.9V11.7L17.8 9.6Z" />
            <path d="M12 13.2L8.4 15.3V19.5L12 21.6L15.6 19.5V15.3L12 13.2Z" />
            <path d="M10.9 6.4H13.1" />
            <path d="M5.1 13.6H7.3" />
            <path d="M16.7 13.6H18.9" />
            <path d="M10.9 17.2H13.1" />
          </g>
        </svg>
      </div>
    </a>
  </div>
</div>
