<div class="z-200 container w-full max-w-[500px] px-4 sm:px-0">
  @for (toast of toastService.toasts; track toast.id) {
    <div
      animate.enter="toast-in"
      class="custom-toast flex w-full items-start justify-between gap-2 rounded-lg border"
      [class.success]="toast.type === 'success'"
      [class.error]="toast.type === 'error'"
    >
      <div class="flex h-[24px] w-[24px] items-center">
        @if (toast.type === 'error') {
          <svg width="20" height="20" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6.00029 8.53864C5.69677 8.53864 5.45094 8.78716 5.45094 9.094C5.45094 9.40083 5.69677 9.64935 6.00029 9.64935C6.3038 9.64935 6.54964 9.40083 6.54964 9.094C6.54964 8.78716 6.3038 8.53864 6.00029 8.53864ZM6.02748 3.43517C6.01649 3.43461 6.00551 3.43434 5.99425 3.43461C5.66491 3.43795 5.39985 3.71118 5.40315 4.04412V4.05689C5.40342 4.05967 5.4037 4.06245 5.4037 4.06495L5.56136 7.45263C5.57235 7.68977 5.76572 7.87609 6.00029 7.87609C6.23486 7.87609 6.42823 7.68977 6.43922 7.45263L6.59661 4.0655C6.61144 3.73284 6.35599 3.45016 6.02748 3.43517ZM11.8421 9.48941L7.16106 0.700862C6.93061 0.268516 6.48591 0 6.00029 0C5.51466 0 5.06969 0.268516 4.83924 0.700862L0.15824 9.48969C-0.00876212 9.80319 -0.0450191 10.1636 0.0563357 10.5046C0.157691 10.8456 0.384022 11.1263 0.69413 11.2952C0.885577 11.3993 1.10147 11.4545 1.31901 11.4545H10.6818C11.034 11.4545 11.3652 11.3157 11.6141 11.0639C11.8629 10.812 12 10.4774 12 10.1214C12 9.90176 11.9456 9.68323 11.8423 9.48969L11.8421 9.48941ZM10.9922 10.4355C10.9093 10.5193 10.7988 10.5657 10.6816 10.5657H1.31901C1.2465 10.5657 1.17453 10.5474 1.11081 10.5127C1.00753 10.4563 0.931997 10.3627 0.898213 10.2491C0.864428 10.1356 0.876513 10.0153 0.932272 9.91093L5.613 1.12238C5.72534 0.911343 5.92118 0.888574 6.00001 0.888574C6.07885 0.888574 6.27469 0.911343 6.38703 1.12238L11.068 9.91093C11.1024 9.97535 11.1205 10.0481 11.1205 10.1214C11.1205 10.24 11.0749 10.3516 10.9919 10.4355H10.9922Z"
            />
          </svg>
        } @else {
          @if (toast.type === 'success') {
            <svg width="20" height="15" viewBox="0 0 20 15" fill="none">
              <path d="M1 5.34547L6.05556 10.4364L14.9311 1.5625" stroke-width="2" stroke-linecap="round" />
            </svg>
          }
        }
      </div>

      <span class="break-all">{{ toast.message }}</span>

      <button (click)="removeToast(toast.id)" class="group ml-auto flex h-[24px] w-[24px] items-center">
        <svg
          width="15"
          height="15"
          viewBox="0 0 15 15"
          [class.success]="toast.type === 'success'"
          [class.error]="toast.type === 'error'"
          class="group-hover:text-[#FDFDFD]"
        >
          <path
            d="M0.595215 14.4052L14.4047 0.595703"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M14.4047 14.4052L0.595215 0.595703"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  }
</div>
