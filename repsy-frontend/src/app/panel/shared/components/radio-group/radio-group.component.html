<div class="flex flex-col gap-2">
  @for (option of options; track option.value) {
    <label
      class="flex cursor-pointer items-center gap-2 text-[#9FA0A0] transition-colors hover:text-white"
      [class.cursor-not-allowed]="disabled"
      [class.text-white]="isSelected(option.value)"
    >
      <input
        type="radio"
        [name]="name"
        [value]="option.value"
        [checked]="isSelected(option.value)"
        [disabled]="disabled"
        (change)="selectOption(option.value)"
        class="h-4 w-4 cursor-pointer border-[#404141] bg-transparent text-[#69ffb4] focus:outline-none"
        [class.cursor-not-allowed]="disabled"
      />
      <span class="text-sm">{{ option.label }}</span>
    </label>
  }
</div>
