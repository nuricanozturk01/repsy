<header class="header bg-primary-500 fixed top-0 z-3 flex w-full px-4 sm:px-6 md:px-8 lg:px-[75px]">
  <div class="mx-auto flex w-full items-center justify-between">
    <div class="flex items-center gap-4">
      <!-- Mobile Menu Button -->
      <button
        type="button"
        class="hover:text-secondary-500 inline-flex items-center justify-center text-neutral-200 md:hidden"
        (click)="openMobileMenu()"
        aria-label="Toggle menu"
        [attr.aria-expanded]="isMobileMenuOpen"
      >
        <span class="sr-only">Open main menu</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Repsy Logo -->
      <a [routerLink]="['/']" class="inline-block shrink-0">
        <img
          ngSrc="/assets/icons/repsy/repsy-brand.svg"
          priority
          alt="Repsy Logo"
          class="w-[100px] sm:w-[110px] md:w-[126px]"
          height="35"
          width="126"
        />
      </a>
    </div>

    <div class="flex h-[42px] items-center gap-[32px]">
      <!-- Documentation -->
      <a
        href="https://docs.repsy.io/"
        target="_blank"
        rel="noopener"
        class="group flex items-center justify-center text-[#9FA0A0] hover:text-[#FDFDFD]"
        aria-label="Documentation"
      >
        <img
          class="h-6 w-6 group-hover:text-[#FDFDFD] sm:h-7 sm:w-7"
          ngSrc="/assets/icons/header/doc.svg"
          height="22"
          width="22"
          alt="Repsy"
        />
      </a>

      <!-- Profile Dropdown -->
      <div class="relative">
        <button
          class="group flex items-center justify-center gap-2 text-[#9FA0A0]"
          (click)="toggleProfileDropdown($event)"
        >
          <app-profile-avatar [email]="email" [size]="45" [fallbackChar]="username[0].toUpperCase()" />
          <svg
            class="group-hover:text-secondary-500"
            [class.rotate-180]="profileDropdown"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            stroke="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M4 6L8 10L12 6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        @if (profileDropdown) {
          <div
            animate.enter="fade-in-down"
            class="absolute top-[44px] right-0 z-2 w-[150px] overflow-hidden rounded-lg border border-[#404141] bg-[#101112] shadow-lg"
          >
            <!-- Profile -->
            <a
              [href]="'profile'"
              class="flex w-full items-center gap-2 px-4 py-2 text-[14px] text-white hover:bg-[#2D2C2C]"
            >
              <img
                class="h-4 w-4 sm:h-5 sm:w-5"
                ngSrc="/assets/icons/header/profile.svg"
                height="18"
                width="18"
                alt="Repsy"
              />
              Profile
            </a>

            <!-- Docs -->
            <a
              href="https://docs.repsy.io/"
              target="_blank"
              rel="noopener"
              class="flex w-full items-center gap-2 px-4 py-2 text-[14px] text-white hover:bg-[#2D2C2C]"
            >
              <img
                class="h-4 w-4 sm:h-5 sm:w-5"
                ngSrc="/assets/icons/header/doc.svg"
                height="18"
                width="18"
                alt="Repsy"
              />
              Docs
            </a>

            <!-- Logout -->
            <button
              (click)="logOut()"
              class="flex w-full items-center gap-2 px-4 py-2 text-[14px] text-white hover:bg-[#2D2C2C]"
            >
              <img
                class="h-4 w-4 sm:h-5 sm:w-5"
                ngSrc="/assets/icons/header/logout2.svg"
                height="16"
                width="16"
                alt="Repsy"
              />
              Log out
            </button>
          </div>
        }
      </div>
    </div>
  </div>

  <app-divider class="absolute bottom-0 left-0 w-full" />
</header>
