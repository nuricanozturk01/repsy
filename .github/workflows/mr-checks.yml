name: MR Checks

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  pre-checks:
    name: Editorconfig check - All
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: There must be only one .editorconfig file
        run: |
          if [ "$(find . -name '.editorconfig' | wc -l)" != "1" ]
          then
            exit 1
          fi

      - name: Install editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@v2
        with:
          version: v3.0.3

      - run: editorconfig-checker

  java-checks:
    name: Repsy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.19.0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Install core modules
        run: mvn -B -ntp install -f core/pom.xml -DskipTests -Drat.skip=true -Dcheckstyle.skip=true

      - name: Build and Verify
        run: mvn -B -ntp verify

  repsy-frontend:
    name: Repsy frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./repsy-frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check
        run: pnpm run lint
